name: uog_guide
description: UOG Mandi Bahauddin Sub-Campus Student Guide App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.12.0
  url_launcher: ^6.2.2
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  firebase_auth: ^5.4.4
  font_awesome_flutter: ^11.0.0
  shared_preferences: ^2.2.2
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/uogicon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/uogicon.png"
  min_sdk_android: 21
